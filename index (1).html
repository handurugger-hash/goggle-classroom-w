<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Implicit</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%230a0a0a'/><text x='32' y='44' font-family='Georgia' font-size='36' font-weight='bold' fill='white' text-anchor='middle'>I</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --bg2: #0f0f0f;
      --bg3: #161616;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8e8;
      --muted: rgba(255,255,255,0.35);
      --glow: rgba(255,255,255,0.18);
      --accent: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* Subtle noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: white;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: white; }

    /* HERO */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 0 24px;
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      animation: fadeUp 1s ease both;
      animation-delay: 0.2s;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(72px, 14vw, 160px);
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1;
      color: white;
      text-shadow:
        0 0 20px rgba(255,255,255,0.12),
        0 0 60px rgba(255,255,255,0.07),
        0 0 120px rgba(255,255,255,0.04);
      animation: fadeUp 1s ease both, glowPulse 4s ease-in-out infinite;
      animation-delay: 0.4s, 1.4s;
      position: relative;
    }

    .hero-title::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.25);
    }

    .hero-sub {
      margin-top: 36px;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--muted);
      animation: fadeUp 1s ease both;
      animation-delay: 0.7s;
    }

    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeUp 1s ease both;
      animation-delay: 1.2s;
    }

    .scroll-hint span {
      display: block;
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
      animation: scrollLine 2s ease-in-out infinite;
    }

    /* GAMES SECTION */
    .games-section {
      position: relative;
      z-index: 1;
      padding: 80px 48px 120px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* GAMES BAR */
    .games-bar {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .games-bar::-webkit-scrollbar { height: 4px; }
    .games-bar::-webkit-scrollbar-track { background: transparent; }
    .games-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .game-card {
      flex: 0 0 200px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:hover {
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    .game-card.active-game {
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    .game-thumb {
      width: 100%;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      position: relative;
      overflow: hidden;
    }

    .game-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.4));
    }

    .game-info {
      padding: 14px 16px;
    }

    .game-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: white;
      margin-bottom: 4px;
    }

    .game-tag {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* GAME VIEWER */
    .game-viewer {
      margin-top: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg3);
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .game-viewer.visible { display: block; }

    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .viewer-title {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .viewer-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 14px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: 0.2s;
    }

    .viewer-close:hover { color: white; border-color: rgba(255,255,255,0.3); }

    .game-frame-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
      min-height: 500px;
      background: #001a33;
    }

    /* SNAKE GAME EMBEDDED */
    #snake-embed {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .snake-canvas-wrap { position: relative; }

    #snakeCanvas {
      border: 3px solid rgba(255,255,255,0.2);
      background: #001a33;
      box-shadow: 0 0 30px rgba(0,229,255,0.25);
      display: block;
      outline: none;
    }

    #snakeOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: white;
      text-align: center;
      gap: 8px;
    }

    #snakeOverlay .play-hint { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.2em; }

    .snake-sidebar {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 20px;
      min-width: 160px;
      font-family: 'DM Mono', monospace;
      color: white;
    }

    .s-label { font-size: 9px; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .s-val { font-size: 28px; color: #00e5ff; margin-bottom: 16px; }
    .s-btn {
      width: 100%; padding: 8px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
      color: white; font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; cursor: pointer; margin-bottom: 8px; transition: 0.2s;
    }
    .s-btn:hover { background: rgba(255,255,255,0.15); }

    /* PLACEHOLDER GAMES */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      gap: 12px;
    }

    .coming-soon .cs-icon { font-size: 40px; opacity: 0.3; }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.3);
    }

    .footer-copy {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2);
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.12), 0 0 60px rgba(255,255,255,0.07), 0 0 120px rgba(255,255,255,0.04); }
      50% { text-shadow: 0 0 30px rgba(255,255,255,0.18), 0 0 80px rgba(255,255,255,0.1), 0 0 150px rgba(255,255,255,0.06); }
    }

    @keyframes scrollLine {
      0% { opacity: 1; transform: scaleY(1) translateY(0); }
      100% { opacity: 0; transform: scaleY(0.5) translateY(20px); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">Implicit</div>
  <ul class="nav-links">
    <li><a href="#games">Games</a></li>
    <li><a href="#">About</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">Welcome to</div>
  <h1 class="hero-title">Implicit</h1>
  <p class="hero-sub">Your game arcade</p>
  <div class="scroll-hint">
    <span></span>
    Scroll
  </div>
</section>

<!-- GAMES SECTION -->
<section class="games-section" id="games">
  <div class="section-header">
    <div class="section-label">Game Arcade</div>
    <div class="section-line"></div>
  </div>

  <div class="games-bar">
    <div class="game-card" onclick="openGame('snake')">
      <div class="game-thumb">🐍</div>
      <div class="game-info">
        <div class="game-name">Cyber Snake</div>
        <div class="game-tag">Classic · Arcade</div>
      </div>
    </div>
    <div class="game-card" onclick="openGame('placeholder1')">
      <div class="game-thumb">🎮</div>
      <div class="game-info">
        <div class="game-name">Coming Soon</div>
        <div class="game-tag">Unlisted</div>
      </div>
    </div>
    <div class="game-card" onclick="openGame('placeholder2')">
      <div class="game-thumb">🕹️</div>
      <div class="game-info">
        <div class="game-name">Coming Soon</div>
        <div class="game-tag">Unlisted</div>
      </div>
    </div>
    <div class="game-card" onclick="openGame('placeholder3')">
      <div class="game-thumb">⚡</div>
      <div class="game-info">
        <div class="game-name">Coming Soon</div>
        <div class="game-tag">Unlisted</div>
      </div>
    </div>
  </div>

  <!-- GAME VIEWER -->
  <div class="game-viewer" id="gameViewer">
    <div class="viewer-header">
      <div class="viewer-title" id="viewerTitle">—</div>
      <button class="viewer-close" onclick="closeGame()">✕ Close</button>
    </div>
    <div class="game-frame-wrap" id="gameFrameWrap"></div>
  </div>
</section>

<footer>
  <div class="footer-logo">Implicit</div>
  <div class="footer-copy">© 2026</div>
</footer>

<script>
  // ── GAME LAUNCHER ──
  function openGame(id) {
    const viewer = document.getElementById('gameViewer');
    const title = document.getElementById('viewerTitle');
    const wrap = document.getElementById('gameFrameWrap');

    viewer.classList.add('visible');
    viewer.scrollIntoView({ behavior: 'smooth', block: 'start' });

    if (id === 'snake') {
      title.textContent = 'Cyber Snake';
      wrap.style.background = '#001a33';
      wrap.innerHTML = buildSnakeHTML();
      initSnake();
    } else {
      title.textContent = 'Coming Soon';
      wrap.style.background = '#0f0f0f';
      wrap.innerHTML = `<div class="coming-soon"><div class="cs-icon">🔒</div><div>Game not yet available</div></div>`;
    }
  }

  function closeGame() {
    const viewer = document.getElementById('gameViewer');
    viewer.classList.remove('visible');
    document.getElementById('gameFrameWrap').innerHTML = '';
    snakeRunning = false;
  }

  function buildSnakeHTML() {
    return `
      <div id="snake-embed">
        <div class="snake-canvas-wrap">
          <div id="snakeOverlay" onclick="startSnake()">
            <div>CLICK TO PLAY</div>
            <div class="play-hint">Arrow keys to move</div>
          </div>
          <canvas id="snakeCanvas" width="400" height="400" tabindex="1"></canvas>
        </div>
        <div class="snake-sidebar">
          <div class="s-label">Score</div>
          <div class="s-val" id="s-score">0</div>
          <div class="s-label">Best</div>
          <div class="s-val" id="s-best">0</div>
          <button class="s-btn" onclick="snakeFullReset()">RESET</button>
        </div>
      </div>
    `;
  }

  // ── SNAKE GAME ──
  let snakeRunning = false, snakeOver = false;
  let snk, snkFoods, snkDir, snkQueue, snkScore, snkBest, snkLastTick, snkProgress;
  const BOX = 20;
  const SNK_COLOR = "#00e5ff";

  function initSnake() {
    snkBest = 0;
    snakeOver = false;
    snakeRunning = false;

    window.addEventListener('keydown', snakeKeyHandler);
  }

  function snakeKeyHandler(e) {
    if (!snakeRunning || snakeOver) return;
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    const last = snkQueue.length ? snkQueue[snkQueue.length-1] : snkDir;
    if (e.key === "ArrowLeft" && last !== "RIGHT") snkQueue.push("LEFT");
    else if (e.key === "ArrowUp" && last !== "DOWN") snkQueue.push("UP");
    else if (e.key === "ArrowRight" && last !== "LEFT") snkQueue.push("RIGHT");
    else if (e.key === "ArrowDown" && last !== "UP") snkQueue.push("DOWN");
    if (snkQueue.length > 3) snkQueue.shift();
  }

  function startSnake() {
    document.getElementById('snakeOverlay').style.display = 'none';
    document.getElementById('snakeCanvas').focus();
    snakeRunning = true;
    resetSnake();
  }

  function resetSnake() {
    snk = [{x:10*BOX, y:10*BOX, oldX:10*BOX, oldY:10*BOX}];
    snkFoods = [randPos(), randPos()];
    snkDir = "RIGHT"; snkQueue = []; snkScore = 0; snakeOver = false;
    snkLastTick = performance.now(); snkProgress = 0;
    updateSnakeUI();
    requestAnimationFrame(snakeLoop);
  }

  function snakeFullReset() {
    snkBest = 0;
    resetSnake();
  }

  function randPos() {
    return { x: Math.floor(Math.random()*19+1)*BOX, y: Math.floor(Math.random()*19+1)*BOX };
  }

  function snakeLoop(now) {
    if (!snakeRunning || snakeOver) return;
    const canvas = document.getElementById('snakeCanvas');
    if (!canvas) return;
    const dt = now - snkLastTick;
    if (dt >= 125) {
      snakeStep();
      snkLastTick = now;
      snkProgress = 0;
    } else {
      snkProgress = dt / 125;
    }
    renderSnake(canvas);
    requestAnimationFrame(snakeLoop);
  }

  function snakeStep() {
    if (snkQueue.length) snkDir = snkQueue.shift();
    snk.forEach(s => { s.oldX = s.x; s.oldY = s.y; });
    let hx = snk[0].x, hy = snk[0].y;
    if (snkDir==="LEFT") hx -= BOX;
    if (snkDir==="RIGHT") hx += BOX;
    if (snkDir==="UP") hy -= BOX;
    if (snkDir==="DOWN") hy += BOX;

    if (hx < 0 || hx >= 400 || hy < 0 || hy >= 400) { snakeGameOver(); return; }
    if (snk.some((s,i) => i && s.x===hx && s.y===hy)) { snakeGameOver(); return; }

    const head = {x:hx, y:hy, oldX:snk[0].x, oldY:snk[0].y};
    const ate = snkFoods.findIndex(f => f.x===hx && f.y===hy);
    if (ate !== -1) {
      snkScore++;
      if (snkScore > snkBest) snkBest = snkScore;
      snkFoods[ate] = randPos();
      snk.unshift(head);
      updateSnakeUI();
    } else {
      snk.pop();
      snk.unshift(head);
    }
  }

  function snakeGameOver() {
    snakeOver = true;
    const overlay = document.getElementById('snakeOverlay');
    if (overlay) {
      overlay.style.display = 'flex';
      overlay.innerHTML = `<div>GAME OVER</div><div class="play-hint">Score: ${snkScore} — Click to restart</div>`;
      overlay.onclick = startSnake;
    }
  }

  function updateSnakeUI() {
    const sc = document.getElementById('s-score');
    const bs = document.getElementById('s-best');
    if (sc) sc.textContent = snkScore;
    if (bs) bs.textContent = snkBest;
  }

  function renderSnake(canvas) {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "#001a33";
    ctx.fillRect(0, 0, 400, 400);

    // Food
    snkFoods.forEach(f => {
      ctx.save();
      ctx.shadowBlur = 15; ctx.shadowColor = "#ffeb3b";
      ctx.fillStyle = "#ffeb3b";
      ctx.fillRect(f.x+4, f.y+4, BOX-8, BOX-8);
      ctx.strokeStyle = "white"; ctx.lineWidth = 1.5;
      ctx.strokeRect(f.x+2, f.y+2, BOX-4, BOX-4);
      ctx.restore();
    });

    // Snake
    for (let i = 0; i < snk.length; i++) {
      ctx.save();
      let cx = snk[i].oldX + (snk[i].x - snk[i].oldX) * snkProgress;
      let cy = snk[i].oldY + (snk[i].y - snk[i].oldY) * snkProgress;
      if (Math.abs(snk[i].x - snk[i].oldX) > BOX) cx = snk[i].x;
      if (Math.abs(snk[i].y - snk[i].oldY) > BOX) cy = snk[i].y;

      if (i === 0) {
        ctx.shadowBlur = 15; ctx.shadowColor = SNK_COLOR;
        ctx.fillStyle = "white";
        ctx.fillRect(cx, cy, BOX, BOX);
        ctx.shadowBlur = 0; ctx.fillStyle = "black";
        const xo = snkDir==="RIGHT"?14:snkDir==="LEFT"?3:8;
        const yo = snkDir==="DOWN"?14:snkDir==="UP"?3:8;
        if (snkDir==="RIGHT"||snkDir==="LEFT") {
          ctx.fillRect(cx+xo, cy+5, 3, 3); ctx.fillRect(cx+xo, cy+12, 3, 3);
        } else {
          ctx.fillRect(cx+5, cy+yo, 3, 3); ctx.fillRect(cx+12, cy+yo, 3, 3);
        }
      } else {
        ctx.shadowBlur = 10; ctx.shadowColor = SNK_COLOR;
        ctx.globalAlpha = Math.max(1 - i/(snk.length+5), 0.3);
        ctx.fillStyle = SNK_COLOR;
        ctx.fillRect(cx, cy, BOX, BOX);
      }
      ctx.restore();
    }
  }
</script>
</body>
</html>
